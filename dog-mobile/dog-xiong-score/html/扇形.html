<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>纯CSS扇形菜单</title>
    <style type="text/css">
        /*导航外层div设为圆形*/
        .css-transforms .menu-wrapper {
            overflow: hidden;
            zoom: 1;
            position: relative;
            width: 460px;
            height: 460px;
            margin: 40px auto 0;
            -webkit-border-radius: 50%;
            -moz-border-radius: 50%;
            border-radius: 50%;
            background: transparent;
            pointer-events: auto;
            border: 1px solid #ccc;
        }

        /*覆盖a标签的内侧靠近圆心的部分, 避免鼠标点击事件*/
         .menu-wrapper .middle{
            color: transparent;

            display:block;
            position: absolute;
            z-index:10;
            left: 50%;
            top:50%;
            margin-left: -150px;
            margin-top: -150px;
            width: 300px;
            height: 300px;
            -webkit-border-radius: 50%;
            -moz-border-radius: 50%;
            border-radius: 50%;
            background-color: #f0f0f0;
           
        }
        .x1{
            position: absolute;
            z-index:10;
            left: 50%;
            top:50%;
            margin-left: -125px;
            margin-top: -125px;
            width: 250px;
            height: 250px;
            -webkit-border-radius: 50%;
            -moz-border-radius: 50%;
            border-radius: 50%;
            background-color: #fff;
        }
        .css-transforms .menu-wrapper li {
            position: absolute;
            top: -70px;
            left: -70px;
            overflow: hidden;
            width: 300px;
            height: 300px;
            transform-origin: 100% 100%;
            pointer-events: none;
            /* border: 1px solid green; */
        }

        /*a标签反倾斜角度为-(90-x),旋转角度为-x,x为我们想要的圆心角,在这个demo里,有3个列表项,半圆,得出圆心角为60*/
        .css-transforms .menu-wrapper li a {
            position: absolute;
            right: -200px;
            bottom: -200px;
            display: block;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            color: #fff;
            text-align: center;
            text-decoration: none;
            /*先斜切后旋转,不可颠倒*/
            -webkit-transform: skew(-30deg) rotate(-60deg) scale(1);
            -moz-transform: skew(-30deg) rotate(-60deg) scale(1);
            -ms-transform: skew(-30deg) rotate(-60deg) scale(1);
            -o-transform: skew(-30deg) rotate(-60deg) scale(1);
            transform: skew(-30deg) rotate(-60deg) scale(1);
            pointer-events: auto;
        }

       

        /*列表项倾斜角度为90-x,每个列表项的旋转角度依次间隔 >60 */
         .css-transforms .menu-wrapper li:first-child {
            -webkit-transform: rotate(-10deg) skew(30deg);
            -moz-transform: rotate(-10deg) skew(30deg);
            -ms-transform: rotate(-10deg) skew(30deg);
            -o-transform: rotate(-10deg) skew(30deg);
            transform: rotate(-10deg) skew(30deg);
        }
        .css-transforms .menu-wrapper li:nth-child(2) {
            -webkit-transform: rotate(60deg) skew(30deg);
            -moz-transform: rotate(60deg) skew(30deg);
            -ms-transform: rotate(60deg) skew(30deg);
            -o-transform: rotate(60deg) skew(30deg);
            transform: rotate(60deg) skew(30deg);
        }
        .css-transforms .menu-wrapper  li:nth-child(3) {
            -webkit-transform: rotate(-130deg) skew(30deg);
            -moz-transform: rotate(-130deg) skew(30deg);
            -ms-transform: rotate(-130deg) skew(30deg);
            -o-transform: rotate(-130deg) skew(30deg);
            transform: rotate(130deg) skew(30deg);
        }
        .css-transforms .menu-wrapper  li:nth-child(4) {
            -webkit-transform: rotate(-200deg) skew(30deg);
            -moz-transform: rotate(-200deg) skew(30deg);
            -ms-transform: rotate(-200deg) skew(30deg);
            -o-transform: rotate(-200deg) skew(30deg);
            transform: rotate(200deg) skew(30deg);
        }
        .css-transforms .menu-wrapper  li:nth-child(5) {
            -webkit-transform: rotate(-270deg) skew(30deg);
            -moz-transform: rotate(-270deg) skew(30deg);
            -ms-transform: rotate(-270deg) skew(30deg);
            -o-transform: rotate(-270deg) skew(30deg);
            transform: rotate(270deg) skew(30deg);
        }
        .css-transforms .menu-wrapper li a span{
            display: block;
            font-size: 20px;
            text-align:center;
        }
        .css-transforms .menu-wrapper li:first-child a{
            background: radial-gradient(transparent 45%, #dc7d01 35%);
        }
        .css-transforms .menu-wrapper li:nth-child(2) a{
            background: radial-gradient(transparent 45%, #a70101 35%);
        }
        .css-transforms .menu-wrapper li:nth-child(3) a{
            background: radial-gradient(transparent 46%, #017d07 35%);
        }
        .css-transforms .menu-wrapper li:nth-child(4) a{
            background: radial-gradient(transparent 45%, skyblue 35%);
        }
        .css-transforms .menu-wrapper li:nth-child(5) a{
            background: radial-gradient(transparent 45%, #FFC00F 35%);
        }
       
    </style>
</head>
<body>
<div class="css-transforms" id="box">
    <div class="menu-wrapper">
        <div class="middle">
            <div class="x1"></div>
        </div>
        <ul>
            <li><a href="#" class="first"><img src="" alt=""><span>犬类生活习性</span></a></li>
            <li><a href="#" class="second"><img src="" alt=""><span>犬类生理知识</span></a></li>
            <li><a href="#" class="third"><img src="" alt=""><span>犬类病症</span></a></li>
            <li><a href="#" class="forth"><img src="" alt=""><span>犬类病症</span></a></li>
            <li><a href="#" class="fifth"><img src="" alt=""><span>犬类病症</span></a></li>
           
        </ul>
    </div>
</div>
</body>
</html>
