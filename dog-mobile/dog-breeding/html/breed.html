<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繁殖配种</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/breed.css">
</head>
<body>
    <div id="infor">
        <div id="img">
            <img src="../img/dog.jpg">
        </div>
        <div id="inforshow">
            <div class="mininfor">
                <div class="firstmininfor">
                    <span>犬名：</span>
                    <span>小丫</span>
                </div>
                <div class="lastmininfor">
                    <span>性别：</span>
                    <span>雌性</span>
                </div>
            </div>
            <div class="mininfor">
                <div class="firstmininfor">
                    <span>生日：</span>
                    <span>2019.06</span>
                </div>
                <div class="lastmininfor">
                    <span>身高：</span>
                    <span>58cm</span>
                </div>
            </div>
            <div class="mininfor">
                <div class="firstmininfor">
                    <span>犬种：</span>
                    <span>金毛寻回犬</span>
                </div>
                <div class="lastmininfor">
                    <span>体重：</span>
                    <span>27.5kg</span>
                </div>
            </div>
            <div id="selfinfor">
                <div id="detailinfor">
                    <img src="../img/small.jpg">
                    <div id="name">
                        <div>小丸子</div>
                        <div>1686粉丝</div>
                    </div>
                </div>
                <div id="city">
                    <span class="iconfont">&#xe630;</span>
                    <span>1.3km</span>
                </div>
                <div id="button"> 
                    <div>立即预约</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
