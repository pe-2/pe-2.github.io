<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言簿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            checkbox-decoration: non<img src="https://ss1.bdstatic.com/70cFvXSh_Q1YnxGkpoWK1HF6hhy/it/u=2827209932,1749540117&fm=26&gp=0.jpg" alt="">e;
        }
        
        .main {
            width: 600px;
            background-color: rgb(230 230 230);
            margin: 0 auto;
            border: 1.4px solid black;
        }
        
        .top {
            height: 28px;
            background-color: rgb(189, 147, 189);
            line-height: 28px;
            border-bottom: 1.4px solid black;
        }
        
        .input_box {
            height: 28px;
            width: 100%;
            display: flex;
            color: red;
            line-height: 25px;
            border-bottom: 1.4px solid black;
        }
        
        .input_box div {
            border-right: 1.4px solid black;
            width: 150px;
            text-align: right;
            color: black;
        }
        
        .input_box input {
            width: 250px;
            height: 65%;
            margin: 2px;
        }
        
        .input_liu {
            height: 200px;
            border-bottom: 1.4px solid black;
            display: flex;
            line-height: 350px;
            color: red;
        }
        
        .input_liu div {
            border-right: 1.4px solid black;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            line-height: normal;
            color: black;
            width: 150px;
        }
        
        .input_liu input {
            flex: 2.849;
            margin: 5px;
        }
        
        .input_liu div span:nth-child(2) {
            color: rgb(238, 59, 59);
        }
        
        .input_liu a {
            text-decoration: none;
            color: red;
        }
        
        .input_emoji {
            width: 100%;
            height: 100px;
            border-bottom: 1px solid black;
            display: flex;
        }
        
        .input_emoji .all {}
        
        .input_emoji img {
            width: 23px;
            height: 23px;
            border-radius: 50%;
            vertical-align: middle;
        }
        
        .input_emoji div:nth-child(1) {
            height: 100px;
            width: 150px;
            text-align: right;
            line-height: 100px;
            border-right: 1.4px solid black;
            display: inline-block;
        }
        
        .button_box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 30px;
        }
        
        .input_pro {
            width: 100%;
            height: 150px;
            border-bottom: 1px solid black;
            display: flex;
        }
        
        .input_pro div:nth-child(1) {
            height: 150px;
            width: 150px;
            text-align: right;
            line-height: 150px;
            border-right: 1.4px solid black;
            display: inline-block;
        }
        
        #aa {
            display: flex;
            justify-content: space-between;
            align-content: center;
            flex-wrap: wrap;
            width: 75%;
            height: 100px;
        }
        
        #aa div {
            width: 50px;
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="main">

        <div class="input_box">

        <div class="input_box">
            <div>其他联系方式：&nbsp;
            </div><input type="tex" name="" id=""> *
        </div>
        <div class="input_liu">
            <div><span>留言内容：</span><span>（200字以内）</span></div><input type="text" name="" id=""><a href="">*</a></div>
        <div class="input_emoji">

            </div>
        </div>
        <div class="input_pro">
            <div>请选择头像：</div>

    </div>
</body>

</html>
